<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 520" fill="none">
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6b2d5c"/>
      <stop offset="50%" stop-color="#c94b73"/>
      <stop offset="100%" stop-color="#e8a838"/>
    </linearGradient>
    <linearGradient id="g2" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1f7a80"/>
      <stop offset="100%" stop-color="#3cb8b0"/>
    </linearGradient>
    <linearGradient id="g3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f5c96a"/>
      <stop offset="100%" stop-color="#e8a838"/>
    </linearGradient>
    <linearGradient id="bust" x1="30%" y1="0%" x2="70%" y2="100%">
      <stop offset="0%" stop-color="#f0d4b8"/>
      <stop offset="45%" stop-color="#e8b88a"/>
      <stop offset="100%" stop-color="#c98b5c"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#6b2d5c" flood-opacity="0.2"/>
    </filter>
  </defs>

  <!-- paint splashes -->
  <ellipse cx="90" cy="120" rx="52" ry="38" fill="#c94b73" opacity="0.85" transform="rotate(-25 90 120)"/>
  <ellipse cx="400" cy="90" rx="44" ry="30" fill="#e8a838" opacity="0.9" transform="rotate(20 400 90)"/>
  <ellipse cx="420" cy="380" rx="56" ry="40" fill="#3cb8b0" opacity="0.8" transform="rotate(-15 420 380)"/>
  <ellipse cx="70" cy="400" rx="40" ry="28" fill="#9b3d87" opacity="0.75" transform="rotate(30 70 400)"/>
  <circle cx="130" cy="280" r="22" fill="#f5c96a" opacity="0.9"/>
  <circle cx="360" cy="250" r="18" fill="#d4537e" opacity="0.85"/>
  <path d="M200 60 Q240 30 280 55 Q310 80 290 110 Q250 95 200 60Z" fill="url(#g1)" opacity="0.7"/>
  <path d="M320 420 Q360 390 390 430 Q370 470 330 455 Q300 440 320 420Z" fill="url(#g2)" opacity="0.75"/>

  <!-- decorative frame arc -->
  <path d="M140 180 Q240 100 340 180" stroke="url(#g3)" stroke-width="6" stroke-linecap="round" fill="none" opacity="0.6"/>
  <path d="M120 200 Q240 90 360 200" stroke="url(#g1)" stroke-width="3" stroke-linecap="round" fill="none" opacity="0.4"/>

  <!-- classical bust statue -->
  <g filter="url(#soft)">
    <!-- shoulders / pedestal top -->
    <ellipse cx="240" cy="430" rx="95" ry="28" fill="#8b5e3c"/>
    <path d="M155 430 Q155 390 175 370 Q240 350 305 370 Q325 390 325 430Z" fill="#a0714a"/>
    <!-- neck -->
    <path d="M215 370 Q240 355 265 370 L258 320 Q240 310 222 320Z" fill="url(#bust)"/>
    <!-- head -->
    <ellipse cx="240" cy="260" rx="72" ry="82" fill="url(#bust)"/>
    <!-- hair / crown detail -->
    <path d="M175 250 Q180 180 240 165 Q300 180 305 250 Q280 210 240 200 Q200 210 175 250Z" fill="#6b2d5c" opacity="0.9"/>
    <path d="M190 230 Q240 195 290 230 Q270 215 240 210 Q210 215 190 230Z" fill="#9b3d87"/>
    <!-- face features -->
    <ellipse cx="215" cy="255" rx="8" ry="5" fill="#8b6040" opacity="0.5"/>
    <ellipse cx="265" cy="255" rx="8" ry="5" fill="#8b6040" opacity="0.5"/>
    <path d="M228 290 Q240 300 252 290" stroke="#a0714a" stroke-width="3" stroke-linecap="round" fill="none"/>
    <!-- colorful paint on statue -->
    <path d="M195 280 Q210 300 225 285" stroke="#c94b73" stroke-width="8" stroke-linecap="round" fill="none" opacity="0.8"/>
    <path d="M255 270 Q275 290 290 265" stroke="#3cb8b0" stroke-width="7" stroke-linecap="round" fill="none" opacity="0.85"/>
    <circle cx="248" cy="230" r="10" fill="#e8a838" opacity="0.9"/>
    <path d="M180 310 Q200 340 220 320" stroke="#d4537e" stroke-width="6" stroke-linecap="round" fill="none" opacity="0.7"/>
  </g>

  <!-- paint brush -->
  <g transform="translate(330 300) rotate(35)">
    <rect x="0" y="0" width="12" height="70" rx="3" fill="#8b5e3c"/>
    <path d="M-2 70 Q6 95 14 70Z" fill="#1f7a80"/>
    <path d="M1 68 L6 88 L11 68Z" fill="#3cb8b0"/>
  </g>

  <!-- small palette -->
  <ellipse cx="110" cy="340" rx="42" ry="36" fill="#5c3d2e" transform="rotate(-10 110 340)"/>
  <circle cx="98" cy="330" r="7" fill="#c94b73"/>
  <circle cx="118" cy="325" r="7" fill="#e8a838"/>
  <circle cx="128" cy="345" r="7" fill="#3cb8b0"/>
  <circle cx="105" cy="352" r="6" fill="#9b3d87"/>
  <circle cx="120" cy="355" r="5" fill="#6b2d5c"/>
</svg>
